<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Title Generator</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    background: #f6f6f6;
    color: #111;
  }

  .container {
    max-width: 900px;
    margin: 60px auto;
    padding: 20px;
  }

  h1 {
    font-size: 40px;
    margin-bottom: 10px;
  }

  .sub {
    color: #666;
    margin-bottom: 30px;
  }

  .input-box {
    display: flex;
    gap: 10px;
  }

  input {
    flex: 1;
    padding: 14px;
    font-size: 16px;
    border: 1px solid #ddd;
    border-radius: 10px;
  }

  button {
    padding: 14px 20px;
    background: black;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
  }

  button:hover {
    opacity: 0.8;
  }

  .grid {
    margin-top: 30px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .card {
    background: white;
    border: 1px solid #eee;
    border-radius: 12px;
    padding: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: 0.2s;
  }

  .card:hover {
    transform: translateY(-2px);
  }

  .title {
    font-size: 15px;
    flex: 1;
    padding-right: 10px;
  }

  .copy {
    font-size: 12px;
    background: #f2f2f2;
    border: none;
    padding: 6px 10px;
    border-radius: 8px;
    cursor: pointer;
  }

  .loading {
    margin-top: 20px;
    color: #888;
  }

  @media (max-width: 600px) {
    .grid {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>

<body>

<div class="container">
  <h1>AI Title Generator</h1>
  <div class="sub">Generate viral titles like Product Hunt style</div>

  <div class="input-box">
    <input id="topic" placeholder="e.g. weight loss, AI tools, startup ideas..." />
    <button id="generateBtn">Generate</button>
  </div>

  <div id="status" class="loading"></div>
  <div id="result" class="grid"></div>
</div>

<script>
const button = document.getElementById("generateBtn");

button.addEventListener("click", async () => {

  const topic = document.getElementById("topic").value;
  const result = document.getElementById("result");
  const status = document.getElementById("status");

  if (!topic) {
    alert("Please enter a topic");
    return;
  }

  result.innerHTML = "";
  status.innerHTML = "Generating viral titles...";

  try {

    const response = await fetch("https://ai-title-api.a1289458763.workers.dev", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        topic: topic
      })
    });

    const data = await response.json();

    const text = data?.choices?.[0]?.message?.content || "";

    // 👉 把 AI 输出拆成数组
    const titles = text
      .split("\n")
      .map(t => t.replace(/^\d+[\.\-)\s]*/, "").trim())
      .filter(Boolean);

    status.innerHTML = "";

    result.innerHTML = titles.map(title => `
      <div class="card">
        <div class="title">${title}</div>
        <button class="copy" onclick="copyText('${title.replace(/'/g, "\\'")}')">Copy</button>
      </div>
    `).join("");

  } catch (error) {
    console.error(error);
    status.innerHTML = "Error generating titles.";
  }

});

function copyText(text) {
  navigator.clipboard.writeText(text);
}
</script>

</body>
</html>
